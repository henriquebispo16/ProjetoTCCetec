<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <title>First Step Dev</title>
</head>

<body>

    <!-- HEADER -->

    <header class="header">

        <a href="Menu.html" class="logo">
            First Step Dev
        </a>


        <nav>

            <a href="Menu.html">Início</a>

            <a href="TelaSobre/Sobre.html">
                Sobre
            </a>

            <button class="login-btn" onclick="irParaLogin()">
                Login
            </button>

        </nav>

    </header>

    <!-- HERO -->

    <section class="hero">

        <div class="hero-text">

            <h1>
                Transforme aprendizado em experiência real
            </h1>

            <p>
                O First Step Dev conecta programadores iniciantes
                a desafios reais do mercado de tecnologia,
                proporcionando experiência prática, feedback profissional
                e desenvolvimento de portfólio.
            </p>

            <div class="buttons">

                <button class="primary-btn" onclick="irParaLogin()">
                    Começar Agora
                </button>

                <button class="secondary-btn">
                    Saiba Mais
                </button>

            </div>

        </div>

        <div class="hero-image">

            <img src="logo.png" alt="Imagem de Programação">

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
