<!doctype html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <link rel="stylesheet" href="style.css" />

    <title>First Step Dev</title>

    <style>
        .header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
        }

        .header nav a {
            text-decoration: none;
            color: rgb(148, 51, 240);
            font-size: 30px;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <header class="header">

        <nav>
            <a href="../../TelaMenu/Menu.html">Início</a>
        </nav>

    </header>

    <div class="container" id="container">

        <!-- CADASTRO -->
        <div class="form-container sign-up">

            <form>

                <h1>Criar Conta</h1>

                <span>Use seu email para se cadastrar</span>

                <input type="text" placeholder="Nome Completo" required pattern="^[A-Za-zÀ-ÿ]+(\s+[A-Za-zÀ-ÿ]+)+$"
                    title="Por favor, insira seu nome e pelo menos um sobrenome." />

                <input type="email" placeholder="Email" required pattern="^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.com$"
                    title="Digite um email terminado em .com" />

                <input type="password" placeholder="Senha" required
                    pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}$"
                    title="A senha deve ter no mínimo 8 caracteres, incluindo letra, número e caractere especial." />

                <input type="password" placeholder="Confirmar Senha" required />

                <select name="nivelCadastro" id="nivelCadastro" required class="selection">

                    <option value="" disabled selected>
                        Selecione...
                    </option>

                    <option value="aprendiz">
                        Aprendiz
                    </option>

                    <option value="profissional">
                        Profissional
                    </option>

                </select>

                <button type="submit">
                    Cadastrar
                </button>

            </form>

        </div>

        <!-- LOGIN -->
        <div class="form-container sign-in">

            <form id="formLogin">

                <h1>Entrar</h1>

                <span>Use seu email para entrar</span>

                <input type="email" placeholder="Email" required pattern="^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.com$"
                    title="Digite um email terminado em .com" />

                <input type="password" placeholder="Senha" required
                    pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&]).{8,}$"
                    title="A senha deve ter no mínimo 8 caracteres, incluindo letra, número e caractere especial." />

                <a href="TelaEsqueciSenha/Senha.html">
                    Esqueceu sua senha?
                </a>
                <button type="submit">
                    Entrar
                </button>

            </form>

        </div>

        <!-- PAINEL ROXO -->
        <div class="toggle-container">

            <div class="toggle">

                <div class="toggle-panel toggle-left">

                    <h1>Bem-vindo!</h1>

                    <p>Já possui uma conta?</p>

                    <button class="hidden" id="login">
                        Entrar
                    </button>

                </div>

                <div class="toggle-panel toggle-right">

                    <h1>Olá, amigo!</h1>

                    <p>Cadastre-se para acessar a plataforma</p>

                    <button class="hidden" id="register">
                        Cadastrar
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script>

        const formLogin = document.getElementById("formLogin");

        formLogin.addEventListener("submit", function (event) {

            event.preventDefault();

            const email = formLogin.querySelector('input[type="email"]').value;

            const senha = formLogin.querySelector('input[type="password"]').value;

            if (email !== "" && senha !== "") {

                window.location.href = "TelaPrincipal/Principal.html";

            } else {

                alert("Preencha todos os campos!");

            }

        });

    </script>

    <script src="script.js"></script>

</body>

</html>
