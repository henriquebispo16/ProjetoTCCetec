<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>First Step Dev</title>
</head>

<body>

    <div class="container" id="container">
        <div class="form-container"></div>
        <form>
            <h1>Bem Vindo! Criar Conta</h1>
            <div class="social-icons">
                <a href="#" class="icon"><i class="fab fa-google"></i></a>
                <a href="#" class="icon"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" class="icon"><i class="fab fa-github"></i></a>
            </div>
            <span>Ou use seu email para se cadastrar</span>
            <input type="text" placeholder="Nome Completo" />
            <input type="email" placeholder="Email" />
            <input type="password" placeholder="Senha" />
            <input type="password" placeholder="Confirmar Senha" />
            <input type="box" placeholder="Data de Nascimento" />
            <input type="text" placeholder="Telefone" />
            <select name="nivel" id="nivel" required>
                <!-- O placeholder precisa ser disabled e selected -->
                <option value="" disabled selected>Selecione...</option>
                <option value="aprendiz">Aprendiz</option>
                <option value="profissional">Profissional</option>
            </select>

            <input type="checkbox" id="terms" />
            <button type="submit">Cadastrar</button>

        </form>


    </div>

<div class="form-container sing-in"></div>
        <form>
            <h1>Bem Vindo! Entrar</h1>
            <div class="social-icons">
                <a href="#" class="icon"><i class="fab fa-google"></i></a>
                <a href="#" class="icon"><i class="fab fa-linkedin-in"></i></a>
                <a href="#" class="icon"><i class="fab fa-github"></i></a>
            </div>
            <span>Ou use seu email para se entrar</span>
            
            <input type="email" placeholder="Email" />
            <input type="password" placeholder="Senha" />
            <input type="password" placeholder="Confirmar Senha" />
            <select name="nivel" id="nivel" required>
                <!-- O placeholder precisa ser disabled e selected -->
                <option value="" disabled selected>Selecione...</option>
                <option value="aprendiz">Aprendiz</option>
                <option value="profissional">Profissional</option>
            </select>

            <input type="checkbox" id="terms" />
            
                <a href="#">Esqueci minha senha</a>
                <button type="submit">Entrar</button>
        </form>


    </div>

    <div class="toggle-container">
        <div class="toggle">
            <div class="toggle-painel-left">
                <h1>Bem vindo de volta! </h1>
                <p>Para entrar novamente clique no botão "Entrar"</p>
                <button class="hidden" id="login">Entrar</button>
            </div>
            <div class="toggle-painel-right">
                <h1>Olá, seja bem vindo </h1>
                <p>Para se cadastrar clique no botão "Cadastrar"</p>
                <button class="hidden" id="register">Cadastrar</button>
            </div>
        </div>
    </div>




    <script src="script.js"></script>
</body>

</html>
