<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">

    <title>First Step Dev</title>
</head>

<body>

    <div class="container" id="container">

        <!-- Cadastro -->
        <div class="form-container sign-up">
            <form>
                <h1>Bem Vindo! Criar Conta</h1>

                <div class="social-icons">
                    <a href="#" class="icon">
                        <i class="fa-brands fa-google-plus-g"></i>
                    </a>
                    <a href="#" class="icon">
                        <i class="fa-brands fa-github"></i>
                    </a>
                </div>

                <span>Ou use seu email para se cadastrar</span>

                <input type="text" placeholder="Nome Completo" />
                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Senha" />
                <input type="password" placeholder="Confirmar Senha" />
                <input type="date" />

                <select name="nivelCadastro" id="nivelCadastro" required>
                    <option value="" disabled selected>Selecione...</option>
                    <option value="aprendiz">Aprendiz</option>
                    <option value="profissional">Profissional</option>
                </select>

                <label>
                    <input type="checkbox" id="termsCadastro" />
                    Aceito os termos
                </label>

                <button type="submit">Cadastrar</button>
            </form>
        </div>

        <!-- Login -->
        <div class="form-container sign-in">
            <form>
                <h1>Bem Vindo! Entrar</h1>

                <div class="social-icons">
                    <a href="#" class="icon">
                        <i class="fab fa-google"></i>
                    </a>
                    <a href="#" class="icon">
                        <i class="fab fa-linkedin-in"></i>
                    </a>
                    <a href="#" class="icon">
                        <i class="fab fa-github"></i>
                    </a>
                </div>

                <span>Ou use seu email para entrar</span>

                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Senha" />

                <select name="nivelLogin" id="nivelLogin" required>
                    <option value="" disabled selected>Selecione...</option>
                    <option value="aprendiz">Aprendiz</option>
                    <option value="profissional">Profissional</option>
                </select>

                <label>
                    <input type="checkbox" id="termsLogin" />
                    Lembrar-me
                </label>

                <a href="#">Esqueci minha senha</a>
                <button type="submit">Entrar</button>
            </form>
        </div>

        <!-- Painel lateral -->
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                    <h1>Bem vindo de volta!</h1>
                    <p>Para entrar novamente clique no botão "Entrar"</p>
                    <button class="hidden" id="login">Entrar</button>
                </div>
                <div class="toggle-panel toggle-right">
                    <h1>Olá, seja bem vindo</h1>
                    <p>Para se cadastrar clique no botão "Cadastrar"</p>
                    <button class="hidden" id="register">Cadastrar</button>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
